<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Workflow Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 360px;
      margin: 1rem;
    }

    @media (max-width: 480px) {
      body { padding: 0; }
      .login-box {
        border-radius: 0;
        padding: 1.5rem 1rem;
        max-width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .login-title { font-size: 1.25rem; }
      .login-btn { width: 100%; }
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-sub {
      font-size: 0.875rem;
      color: #666;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.8125rem;
      color: #888;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(102,126,234,0.6); }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:active { opacity: 1; }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.8125rem;
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: #444;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-title">⚡ Workflow Console</div>
    <div class="login-sub">请登录以访问控制台</div>
    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn" id="loginBtn">登录</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="footer">Workflow Console · OpenClaw</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.textContent = '登录中...';
      loginBtn.disabled = true;
      errorMsg.textContent = '';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin'
        });
        const data = await res.json();

        if (data.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || '用户名或密码错误';
          loginBtn.textContent = '登录';
          loginBtn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请重试';
        loginBtn.textContent = '登录';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Workflow Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 360px;
      margin: 1rem;
    }

    @media (max-width: 480px) {
      body { padding: 0; }
      .login-box {
        border-radius: 0;
        padding: 1.5rem 1rem;
        max-width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .login-title { font-size: 1.25rem; }
      .login-btn { width: 100%; }
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-sub {
      font-size: 0.875rem;
      color: #666;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.8125rem;
      color: #888;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(102,126,234,0.6); }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:active { opacity: 1; }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.8125rem;
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: #444;
      margin-top: 1.5rem;
    }

    :root {
      color-scheme: dark;
      --bg: #11100d;
      --panel: #1d1a14;
      --line: rgba(237, 221, 184, 0.12);
      --line-strong: rgba(237, 221, 184, 0.22);
      --text: #eee2c8;
      --muted: #a0947b;
      --faint: #665d4a;
      --accent: #d4a84f;
      --danger: #e06f63;
      --mono: "IBM Plex Mono", "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
      --sans: "Avenir Next", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    body {
      font-family: var(--sans);
      background:
        radial-gradient(circle at 16% 12%, rgba(212, 168, 79, 0.16), transparent 26rem),
        radial-gradient(circle at 80% 80%, rgba(142, 191, 148, 0.08), transparent 24rem),
        linear-gradient(180deg, #15130f, var(--bg));
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(237, 221, 184, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(237, 221, 184, 0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,0.75), transparent 78%);
    }

    .login-box {
      position: relative;
      background: linear-gradient(180deg, rgba(36, 32, 21, 0.84), rgba(24, 22, 17, 0.95));
      border-color: var(--line);
      border-radius: 18px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.38);
      overflow: hidden;
    }

    .login-box::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: var(--accent);
      opacity: 0.85;
    }

    .login-kicker {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
    }

    .login-title {
      color: var(--text);
      letter-spacing: -0.055em;
    }

    .login-sub,
    label,
    .footer {
      color: var(--muted);
    }

    label,
    .footer,
    .login-btn,
    input {
      font-family: var(--mono);
    }

    input {
      background: rgba(237, 221, 184, 0.04);
      border-color: var(--line);
      color: var(--text);
      border-radius: 11px;
    }

    input:focus {
      border-color: rgba(212, 168, 79, 0.48);
      box-shadow: 0 0 0 3px rgba(212, 168, 79, 0.09);
    }

    .login-btn {
      background: var(--accent);
      color: #17130b;
      border-radius: 11px;
      font-weight: 800;
    }

    .login-btn:hover {
      opacity: 1;
      background: #e2bb67;
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .error-msg {
      color: #ef958b;
    }

    @media (max-width: 480px) {
      .login-box {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-kicker">OpenClaw Operations</div>
    <div class="login-title">Workflow Console</div>
    <div class="login-sub">进入个人工作流控制台</div>
    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn" id="loginBtn">登录</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="footer">Workflow Console · OpenClaw</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.textContent = '登录中...';
      loginBtn.disabled = true;
      errorMsg.textContent = '';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin'
        });
        const data = await res.json();

        if (data.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || '用户名或密码错误';
          loginBtn.textContent = '登录';
          loginBtn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请重试';
        loginBtn.textContent = '登录';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
